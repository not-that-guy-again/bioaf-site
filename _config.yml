title: bioAF
description: Computational biology infrastructure in 30 minutes, not 6 months.
url: https://bioaf.co
baseurl: ""
image: /assets/images/bioAF-mascot.png

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-seo-tag

collections:
  docs:
    output: true
    permalink: /docs/:path/

defaults:
  - scope:
      path: "docs"
    values:
      layout: docs
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      permalink: /blog/:title/
  - scope:
      path: "_drafts"
      type: posts
    values:
      layout: post
      permalink: /blog/:title/

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
