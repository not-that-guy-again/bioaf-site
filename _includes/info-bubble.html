<details class="info-bubble{% if include.variant %} info-bubble--{{ include.variant }}{% endif %}">
  <summary>
    <span class="info-icon">{% if include.variant == "warning" %}!{% else %}i{% endif %}</span>
    {{ include.title }}
  </summary>
  <div class="info-content">
    {{ include.content }}
  </div>
</details>
